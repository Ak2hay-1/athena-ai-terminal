version: "3.9"

name: athena

services:

  # ==========================================================
  # PostgreSQL
  # ==========================================================

  postgres:

    image: postgres:16

    container_name: athena-postgres

    restart: unless-stopped

    environment:

      POSTGRES_DB: athena

      POSTGRES_USER: postgres

      POSTGRES_PASSWORD: postgres

    ports:

      - "5432:5432"

    volumes:

      - postgres_data:/var/lib/postgresql/data

    healthcheck:

      test: ["CMD-SHELL", "pg_isready -U postgres"]

      interval: 10s

      timeout: 5s

      retries: 5

    networks:

      - athena-network

  # ==========================================================
  # Redis
  # ==========================================================

  redis:

    image: redis:7-alpine

    container_name: athena-redis

    restart: unless-stopped

    ports:

      - "6379:6379"

    volumes:

      - redis_data:/data

    healthcheck:

      test: ["CMD", "redis-cli", "ping"]

      interval: 10s

      timeout: 5s

      retries: 5

    networks:

      - athena-network

  # ==========================================================
  # Ollama
  # ==========================================================

  ollama:

    image: ollama/ollama:latest

    container_name: athena-ollama

    restart: unless-stopped

    ports:

      - "11434:11434"

    volumes:

      - ollama_data:/root/.ollama

    networks:

      - athena-network

  # ==========================================================
  # FastAPI
  # ==========================================================

  api:

    build:

      context: ./backend

      dockerfile: Dockerfile

    container_name: athena-api

    restart: unless-stopped

    env_file:

      - ./backend/.env

    environment:

      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/athena

      REDIS_URL: redis://redis:6379/0

      OLLAMA_HOST: http://ollama:11434

    depends_on:

      postgres:

        condition: service_healthy

      redis:

        condition: service_healthy

    ports:

      - "8000:8000"

    volumes:

      - ./backend:/app

    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload

    networks:

      - athena-network

  # ==========================================================
  # Frontend (Next.js)
  # ==========================================================

  frontend:

    build:

      context: ./frontend

      dockerfile: Dockerfile

      args:

        NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1

        NEXT_PUBLIC_WS_URL: ws://localhost:8000/ws

    container_name: athena-frontend

    restart: unless-stopped

    depends_on:

      - api

    ports:

      - "3000:3000"

    networks:

      - athena-network

  # ==========================================================
  # pgAdmin
  # ==========================================================

  pgadmin:

    image: dpage/pgadmin4:latest

    container_name: athena-pgadmin

    restart: unless-stopped

    environment:

      PGADMIN_DEFAULT_EMAIL: admin@athena.local

      PGADMIN_DEFAULT_PASSWORD: admin

    ports:

      - "5050:80"

    depends_on:

      - postgres

    volumes:

      - pgadmin_data:/var/lib/pgadmin

    networks:

      - athena-network

# ==========================================================
# Networks
# ==========================================================

networks:

  athena-network:

    driver: bridge

# ==========================================================
# Volumes
# ==========================================================

volumes:

  postgres_data:

  redis_data:

  ollama_data:

  pgadmin_data:
